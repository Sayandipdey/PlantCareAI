{% extends 'base.html' %}
{% block title %}Diagnosis Result{% endblock %}

{% block content %}
<main style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 2rem 5%;">
    <div class="result-card" style="max-width: 700px; width: 100%;">
        
        <h2 style="text-align: center; color: var(--primary-color); margin-bottom: 1.5rem;">
            <i class="fa-solid fa-microscope"></i> Diagnosis Complete
        </h2>

        <div style="margin-bottom: 2rem; text-align: center;">
            <img src="{{ url_for('static', filename='uploads/' + image_filename) }}" 
                 style="max-width: 100%; border-radius: 15px; height: 250px; object-fit: cover; box-shadow: var(--shadow);">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; background: var(--bg-color); padding: 1.5rem; border-radius: 15px;">
            <div>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Target Plant</p>
                <p style="font-size: 1.2rem; font-weight: 600;">{{ plant_type }}</p>
            </div>
            <div>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Detected Condition</p>
                <p style="font-size: 1.2rem; font-weight: 600;">{{ condition }}</p>
            </div>
            <div style="grid-column: span 2;">
                <p style="color: var(--text-muted); font-size: 0.9rem;">AI Confidence</p>
                <div style="background: var(--border-color); height: 10px; border-radius: 5px; margin-top: 5px; overflow: hidden;">
                    <div style="width: {{ confidence }}; height: 100%; background: var(--primary-color);"></div>
                </div>
                <p style="text-align: right; font-size: 0.8rem; margin-top: 5px;">{{ confidence }}</p>
            </div>
        </div>

        <div style="background: rgba(16, 172, 132, 0.1); border-left: 4px solid var(--primary-color); padding: 1.5rem; border-radius: 0 10px 10px 0; margin-bottom: 2rem;">
            <h3 style="margin-bottom: 1rem; font-size: 1.1rem;"><i class="fa-solid fa-list-check"></i> Recommended Actions</h3>
            <ul id="recommendation-list" style="padding-left: 1.5rem; color: var(--text-color); line-height: 1.6;">
                </ul>
        </div>

        <div style="text-align: center;">
            <a href="{{ url_for('upload') }}" class="btn"><i class="fa-solid fa-rotate-right"></i> Scan Another Plant</a>
        </div>
    </div>
</main>

<script>
    // Grab the condition from Flask safely
    const detectedCondition = "{{ condition }}".toLowerCase();
    const isHealthy = "{{ is_healthy }}" === "True";
    const recList = document.getElementById('recommendation-list');

    // Agricultural Advice Dictionary
    const actionDatabase = {
        "healthy": [
            "Your plant looks great! Maintain current watering schedule.",
            "Ensure it continues to get appropriate sunlight for its species.",
            "Consider a light standard fertilizer application next season."
        ],
        "early blight": [
            "Prune and safely discard all infected lower leaves.",
            "Apply a copper-based fungicide to protect healthy tissue.",
            "Water at the base of the plant to keep leaves dry."
        ],
        "late blight": [
            "Immediately remove and destroy heavily infected plants.",
            "Apply a broad-spectrum fungicidal spray.",
            "Ensure excellent air circulation and avoid overhead watering."
        ],
        "powdery mildew": [
            "Remove infected parts immediately and destroy them.",
            "Improve air circulation and reduce humidity around the plant.",
            "Use potassium bicarbonate or neem oil organic sprays."
        ],
        "rust": [
            "Prune infected branches to increase airflow.",
            "Avoid excessive nitrogen fertilizers which promote lush, vulnerable growth.",
            "Apply sulfur or copper fungicides as early as possible."
        ]
    };

    // Generate List
    let actions = [];
    
    if(isHealthy) {
        actions = actionDatabase["healthy"];
    } else {
        // Try to match the specific disease, otherwise give a general sick plant fallback
        let matched = false;
        for (let key in actionDatabase) {
            if (detectedCondition.includes(key)) {
                actions = actionDatabase[key];
                matched = true;
                break;
            }
        }
        if (!matched) {
            actions = [
                "Isolate this plant immediately to prevent spread to neighboring crops.",
                "Sanitize your gardening tools (shears, trowels) with rubbing alcohol.",
                "Avoid overhead watering; moisture promotes fungal/bacterial growth.",
                "Consult a local agricultural extension for specialized chemical treatment."
            ];
        }
    }

    // Inject into HTML
    actions.forEach(action => {
        let li = document.createElement('li');
        li.textContent = action;
        recList.appendChild(li);
    });
</script>
{% endblock %}
