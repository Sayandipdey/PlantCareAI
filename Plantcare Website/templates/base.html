<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantCare AI - {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-left">
            <button class="hamburger" id="hamburger-btn" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <div class="logo">
                <a href="{{ url_for('home') }}">
                    <img src="{{ url_for('static', filename='Photos/logo.png') }}" alt="Logo">
                </a>
            </div>
        </div>
        
        <ul class="nav-links">
            <li><a href="{{ url_for('home') }}" class="{% if request.endpoint == 'home' %}active{% endif %}">Home</a></li>
            <li><a href="{{ url_for('about') }}" class="{% if request.endpoint == 'about' %}active{% endif %}">About</a></li>
            <li><a href="{{ url_for('upload') }}" class="{% if request.endpoint == 'upload' %}active{% endif %}">Upload</a></li>
        </ul>

        <div class="nav-controls">
            <button class="theme-btn" id="theme-toggle" aria-label="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>

    <div class="mobile-menu" id="mobile-menu">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('about') }}">About</a>
        <a href="{{ url_for('upload') }}">Upload</a>
    </div>

    {% block content %}{% endblock %}

    <footer>
        <div class="social-links">
            <a href="#" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" aria-label="X (Twitter)"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
        </div>
        <p style="color: var(--text-color); font-weight: 600; font-size: 1.2rem; margin-bottom: 0.5rem;">PlantCare AI</p>
        <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 1.5rem;">hello@plantcare.ai &nbsp;|&nbsp; Chinsurah, West Bengal</p>
        <div style="width: 60px; height: 3px; background: var(--primary-color); margin: 0 auto 1.5rem; border-radius: 5px;"></div>
        <p style="color: var(--text-muted); font-size: 0.9rem;">&copy; 2026 PlantCare AI. All rights reserved.</p>
    </footer>

    <script>
        const themeBtn = document.getElementById('theme-toggle');
        const themeIcon = themeBtn.querySelector('i');
        const body = document.body; 
        
        let currentTheme = localStorage.getItem('theme') || 'dark';
        body.setAttribute('data-theme', currentTheme);
        updateThemeIcon(currentTheme);

        themeBtn.addEventListener('click', () => {
            currentTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', currentTheme);
            localStorage.setItem('theme', currentTheme);
            updateThemeIcon(currentTheme);
        });

        function updateThemeIcon(theme) {
            if(theme === 'dark') { themeIcon.className = "fa-solid fa-sun"; } 
            else { themeIcon.className = "fa-solid fa-moon"; }
        }

        const hamburgerBtn = document.getElementById('hamburger-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        hamburgerBtn.addEventListener('click', () => {
            hamburgerBtn.classList.toggle('active');
            mobileMenu.classList.toggle('open');
        });
    </script>
</body>
</html>
